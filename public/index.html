<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - EduManager</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div style="background: rgba(99, 102, 241, 0.1); width: 4rem; height: 4rem; border-radius: 1rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                    <i data-lucide="user-plus" style="color: var(--primary-color); width: 2rem; height: 2rem;"></i>
                </div>
                <h1>Criar Conta</h1>
                <p>Preencha os dados para se cadastrar no sistema.</p>
            </div>
            
            <form id="registrationForm">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Seu nome completo" required>
                </div>
                <div class="form-group">
                    <label for="tipo">Eu sou:</label>
                    <select id="tipo" required>
                        <option value="aluno">Aluno</option>
                        <option value="professor">Professor</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="turma">Turma</label>
                    <select id="turma" required>
                        <option value="">Selecione sua turma</option>
                        <option value="ADS">Análise e Desenv. de Sistemas</option>
                        <option value="GTI">Gestão de TI</option>
                        <option value="SI">Sistemas de Informação</option>
                    </select>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="matricula">Matrícula</label>
                        <input type="text" id="matricula" placeholder="Ex: 2023001" required>
                    </div>
                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="••••••••" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">
                    Criar Cadastro <i data-lucide="arrow-right" style="width: 1.25rem;"></i>
                </button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-muted);">
                Já possui uma conta? <a href="login.html" style="color: var(--primary-color); font-weight: 600; text-decoration: none;">Faça Login</a>
            </p>
        </div>
    </div>
    
    <div id="toast-container"></div>
    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
